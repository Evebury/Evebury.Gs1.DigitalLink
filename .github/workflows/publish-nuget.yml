name: Publish to NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (leave empty to use version from .csproj)'
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --configuration Release --no-restore
      
    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal
  
  publish:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --configuration Release --no-restore
      
    - name: Build version string
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          VERSION="${{ github.event.inputs.version }}"
        else
          # Extract version from .csproj file
          VERSION=$(grep -oP '<Version>\K[^<]+' Evebury.Gs1.DigitalLink/Evebury.Gs1.DigitalLink.csproj)
        fi
        # Append build number
        FULL_VERSION="${VERSION}.${{ github.run_number }}"
        echo "version=${FULL_VERSION}" >> $GITHUB_OUTPUT
        echo "Package version: ${FULL_VERSION}"
    
    - name: Pack
      run: dotnet pack Evebury.Gs1.DigitalLink/Evebury.Gs1.DigitalLink.csproj --configuration Release --no-build -p:PackageVersion=${{ steps.version.outputs.version }}
      
    - name: Publish to NuGet
      run: dotnet nuget push Evebury.Gs1.DigitalLink/bin/Release/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    
    - name: Create Git tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "v${{ steps.version.outputs.version }}" -m "Release version ${{ steps.version.outputs.version }}"
        git push origin "v${{ steps.version.outputs.version }}"
